# ============================================================
# WATCHTOWER SOC PLATFORM v3.0
# Archivo: docker/docker-compose.yml
# Versión: 2 - Con certificados TLS correctamente montados
# ============================================================

services:

  # ──────────────────────────────────────────────
  # WAZUH INDEXER
  # ──────────────────────────────────────────────
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.7.3
    container_name: wazuh.indexer
    hostname: wazuh.indexer
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_PATH_CONF=/usr/share/wazuh-indexer/config
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./wazuh/config/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
      - ./wazuh/config/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml:ro
      # ── Certificados TLS ──
      # Montamos cada certificado en la ruta EXACTA
      # donde el Indexer los busca (según wazuh.indexer.yml)
      - ./wazuh/certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem:ro
      - ./wazuh/certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.pem:ro
      - ./wazuh/certs/wazuh.indexer.key:/usr/share/wazuh-indexer/certs/wazuh.indexer.key:ro
      - ./wazuh/certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem:ro
      - ./wazuh/certs/admin.key:/usr/share/wazuh-indexer/certs/admin.key:ro
    networks:
      - soc_network
    healthcheck:
      disable: true

  # ──────────────────────────────────────────────
  # WAZUH MANAGER
  # ──────────────────────────────────────────────
  wazuh.manager:
    image: wazuh/wazuh-manager:4.7.3
    container_name: wazuh.manager
    hostname: wazuh.manager
    restart: unless-stopped
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecurePassword123!
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
    volumes:
      - wazuh-manager-data:/var/ossec/data
      - wazuh-manager-logs:/var/ossec/logs
      - wazuh-manager-etc:/var/ossec/etc
      - ./wazuh/config/ossec.conf:/var/ossec/etc/ossec.conf:ro
      # ── Certificados TLS para el Manager ──
      - ./wazuh/certs/root-ca.pem:/etc/ssl/root-ca.pem:ro
      - ./wazuh/certs/wazuh.manager.pem:/etc/ssl/filebeat.pem:ro
      - ./wazuh/certs/wazuh.manager.key:/etc/ssl/filebeat.key:ro
    networks:
      - soc_network
    depends_on:
      wazuh.indexer:
        condition: service_started

  # ──────────────────────────────────────────────
  # WAZUH DASHBOARD
  # ──────────────────────────────────────────────
  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.7.3
    container_name: wazuh.dashboard
    hostname: wazuh.dashboard
    restart: unless-stopped
    ports:
      - "443:5601"
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecurePassword123!
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - ./wazuh/config/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      # ── Certificados TLS para el Dashboard ──
      - ./wazuh/certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem:ro
      - ./wazuh/certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh.dashboard.pem:ro
      - ./wazuh/certs/wazuh.dashboard.key:/usr/share/wazuh-dashboard/certs/wazuh.dashboard.key:ro
    networks:
      - soc_network
    depends_on:
      wazuh.indexer:
        condition: service_started

  # ──────────────────────────────────────────────
  # NEXUS APP (sin cambios)
  # ──────────────────────────────────────────────
  nexus-app:
    build:
      context: ../nexus-app
      dockerfile: Dockerfile
    container_name: nexus-app
    hostname: nexus-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=nexus-db
      - DB_PORT=5432
      - DB_NAME=nexus_fintech
      - DB_USER=nexus_user
      - DB_PASSWORD=NexusDB2024!
    networks:
      - soc_network
    depends_on:
      - nexus-db

  # ──────────────────────────────────────────────
  # NEXUS DB (sin cambios)
  # ──────────────────────────────────────────────
  nexus-db:
    image: postgres:15-alpine
    container_name: nexus-db
    hostname: nexus-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=nexus_fintech
      - POSTGRES_USER=nexus_user
      - POSTGRES_PASSWORD=NexusDB2024!
    volumes:
      - nexus-db-data:/var/lib/postgresql/data
      - ../nexus-app/setup_db.sql:/docker-entrypoint-initdb.d/setup_db.sql:ro
    networks:
      - soc_network

  # ──────────────────────────────────────────────
  # GRAFANA — versión corregida
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    hostname: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=GrafanaSOC2024!
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - soc_network

  # ──────────────────────────────────────────────
  # PROMETHEUS (sin cambios)
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: prometheus
    hostname: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - soc_network

networks:
  soc_network:
    driver: bridge
    name: soc_network

volumes:
  wazuh-indexer-data:
  wazuh-manager-data:
  wazuh-manager-logs:
  wazuh-manager-etc:
  nexus-db-data:
  grafana-data:
  prometheus-data:
