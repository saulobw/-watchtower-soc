<!--
  WATCHTOWER SOC PLATFORM v3.0
  Archivo: ossec.conf
  Descripción: Configuración principal del Wazuh Manager
  Cada sección está comentada para fines educativos
-->
<ossec_config>

  <!--
    SECCIÓN 1: CONFIGURACIÓN GLOBAL
    Define comportamientos generales del manager:
    - Dónde guardar alertas
    - Formato de logs
    - Nivel mínimo de alerta para notificar
  -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh@watchtower-soc.local</email_from>
    <email_to>soc-team@watchtower-soc.local</email_to>
    <email_maxperhour>12</email_maxperhour>
    <email_log_source>alerts.log</email_log_source>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>

  <!--
    SECCIÓN 2: ANÁLISIS DE ALERTAS
    Define el nivel mínimo de alerta que se guarda en log
    Escala de Wazuh: 1 (info) hasta 15 (crítico)
    - Nivel 7+  = Alerta importante
    - Nivel 10+ = Alerta alta (brute force, etc.)
    - Nivel 12+ = Alerta crítica (SQLi, exfiltración)
  -->
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>

  <!--
    SECCIÓN 3: CONEXIÓN CON AGENTES
    Puerto 1514: Los agentes Wazuh instalados en servidores
    envían sus logs a este puerto constantemente.
    Es como el "buzón de entrada" de todos los reportes.
  -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!--
    SECCIÓN 4: INTEGRACIÓN CON WAZUH INDEXER
    Le dice al Manager dónde guardar todas las alertas.
    OpenSearch = base de datos que recibe y almacena
    cada alerta generada por las reglas de detección.
  -->
  <indexer>
    <enabled>yes</enabled>
    <hosts>
      <host>https://wazuh.indexer:9200</host>
    </hosts>
    <ssl>
      <certificate_authorities>
        <ca>/etc/ssl/root-ca.pem</ca>
      </certificate_authorities>
      <certificate>/etc/ssl/filebeat.pem</certificate>
      <key>/etc/ssl/filebeat.key</key>
    </ssl>
  </indexer>

  <!--
    SECCIÓN 5: MONITOR DE INTEGRIDAD DE ARCHIVOS (FIM)
    FIM = File Integrity Monitoring
    Monitorea archivos críticos y alerta si alguien
    los modifica, elimina o crea archivos nuevos.
    
    PARA NUESTRO PROYECTO: Monitoreamos setup_db.sql
    Si alguien modifica el schema de la base de datos
    Nexus Fintech, se dispara una alerta nivel 11.
    
    frequency: cada cuántos segundos revisa (43200 = 12 horas)
  -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>
    <auto_ignore frequency="10" timeframe="3600">no</auto_ignore>

    <!-- Archivos críticos del sistema Linux -->
    <directories report_changes="yes" realtime="yes">/etc,/usr/bin,/usr/sbin</directories>
    <directories report_changes="yes" realtime="yes">/bin,/sbin,/boot</directories>

    <!-- CRÍTICO: Monitoreamos la DB de Nexus Fintech en tiempo real -->
    <directories report_changes="yes" realtime="yes"
      check_all="yes">/var/ossec/etc/shared</directories>

    <!-- Ignoramos archivos que cambian constantemente (evita falsos positivos) -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>
    <nodiff>/etc/ssl/private.key</nodiff>
  </syscheck>

  <!--
    SECCIÓN 6: DETECTOR DE VULNERABILIDADES
    Escanea los paquetes instalados en los agentes y
    los cruza con la base de datos NVD (National 
    Vulnerability Database) para encontrar CVEs conocidos.
    
    Esto nos permitirá decir en el CV:
    "Implementé Vulnerability Detection con feed CVE 
     actualizado diariamente"
  -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60m</feed-update-interval>
  </vulnerability-detection>

  <!--
    SECCIÓN 7: INVENTARIO DEL SISTEMA (SCA)
    SCA = Security Configuration Assessment
    Audita la configuración del sistema contra benchmarks
    de seguridad (CIS Benchmarks, PCI-DSS, etc.)
    Genera un "score" de seguridad para cada agente.
  -->
  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>

  <!--
    SECCIÓN 8: RESPUESTA ACTIVA (Active Response)
    Cuando se detecta un ataque, Wazuh puede ejecutar
    acciones automáticas: bloquear una IP, matar un
    proceso, aislar un sistema, etc.
    
    firewall-drop: bloquea la IP atacante usando iptables
    - level 10+: solo actúa en alertas de nivel 10 o más
    - timeout 3600: bloquea por 1 hora (3600 segundos)
  -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>/var/ossec/etc/wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <command>
    <name>firewall-drop</name>
    <executable>firewall-drop</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>

  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_group>authentication_failures</rules_group>
    <level>10</level>
    <timeout>3600</timeout>
  </active-response>

  <!--
    SECCIÓN 9: MONITOREO DE LOGS DEL SISTEMA
    Le dice a Wazuh qué archivos de log leer y analizar.
    Estos son los "ojos" del SIEM: lee logs del sistema
    operativo, aplicaciones y los procesa con las reglas.
  -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <localfile>
    <log_format>command</log_format>
    <command>df -P</command>
    <frequency>360</frequency>
  </localfile>

  <localfile>
    <log_format>full_command</log_format>
    <command>netstat -tulpn | sed 's/\([[:alnum:]]\+\)\ \+[[:digit:]]\+\ \+[[:digit:]]\+\ \+\(.*\):\([[:digit:]]*\)\ \+\([0-9\.\:\*]*\).\+\ \([[:digit:]]*\/[[:alnum:]\_\-]*\).*/\1 \2 == \3 == \4 \5/' | sort -k 4 -g | sed 's/ == \(.*\) ==/:\1/' | head -20</command>
    <alias>netstat listening ports</alias>
    <frequency>360</frequency>
  </localfile>

  <!-- Incluye todas las reglas adicionales que creemos -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>
  </ruleset>

  <!-- Reglas personalizadas del proyecto (las crearemos en el Paso 5) -->
  <ruleset>
    <decoder_dir>etc/decoders</decoder_dir>
    <rule_dir>etc/rules</rule_dir>
  </ruleset>

</ossec_config>
